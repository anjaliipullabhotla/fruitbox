<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Multiplayer Fruitbox</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        body { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            background: #fdfdfd; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        canvas {
            max-width: 95%; 
            height: auto;   
            border: 3px solid #333;
            border-radius: 8px;
            background: white;
            touch-action: none; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .stats { 
            font-size: 22px; 
            margin: 20px; 
            font-weight: bold;
            color: #444;
        }
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(255,255,255,0.95); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            z-index: 100;
        }
        input { padding: 12px; font-size: 18px; border-radius: 5px; border: 1px solid #ccc; width: 250px; }
        button { margin-top: 15px; padding: 12px 30px; font-size: 18px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #218838; }
    </style>
</head>
<body>
    <div id="login-overlay">
        <h2>Fruitbox Multiplayer</h2>
        <input type="text" id="username-input" placeholder="Your Name...">
        <input type="text" id="room-input" placeholder="Room Number (e.g. 123)">
        <button onclick="startGame()">Join Game</button>
    </div>
    <div class="stats">Waiting for players...</div>

    <canvas id="gameCanvas" width="765" height="450"></canvas>

    <script src="/static/game.js"></script>
</body>
</html>
