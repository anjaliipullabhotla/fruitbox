<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Multiplayer Fruitbox</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        body { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            background: #fdfdfd; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        canvas {
            max-width: 95%; 
            height: auto;   
            background: white;
            touch-action: none; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border: 5px solid #1b5e20; /* Darker green frame */
            border-radius: 8px;
        }
        .stats { 
            font-size: 22px; 
            margin: 20px; 
            font-weight: bold;
            color: #444;
        }
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(255,255,255,0.95); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            z-index: 100;
        }
        #rotate-warning {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #2e7d32; color: white;
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        @media (orientation: portrait) {
            #rotate-warning {
                display: flex;
            }
        }
        input { padding: 12px; font-size: 18px; border-radius: 5px; border: 1px solid #ccc; width: 250px; }
        button { margin-top: 15px; padding: 12px 30px; font-size: 18px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #218838; }
    </style>
</head>
<body>
    <div id="rotate-warning">
        <div style="font-size: 50px;">🔄</div>
        <h2>Please Rotate Your Device</h2>
        <p>Fruitbox is best played horizontally!</p>
    </div>
    <div id="login-overlay">
        <h2>Fruitbox Multiplayer</h2>
        <input type="text" id="username-input" placeholder="Your Name...">
        <input type="text" id="room-input" placeholder="Room Number (e.g. 123)">
        <button onclick="startGame()">Join Game</button>
    </div>
    <div class="stats">Waiting for players...</div>

    <canvas id="gameCanvas" width="765" height="450"></canvas>

    <div class="timer-container" style="width: 765px; margin: 10px 0;">
        <div id="timer-bar" style="width: 100%; height: 20px; background-color: #4CAF50; border-radius: 10px; transition: width 1s linear;"></div>
        <div style="text-align: center; font-weight: bold; margin-top: 5px;">
            Time Left: <span id="timer-text">2:00</span>
        </div>
    </div>

    <script src="/static/game.js"></script>
</body>
</html>
