<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Multiplayer Fruitbox</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        /* 1. Global Reset & Body */
        body { 
            margin: 0;
            padding: 0;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            background: #fdfdfd; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #000000;
            min-height: 100vh;
        }
    
        h1, h2, h3, p {
            color: #000000;
            margin: 10px 0;
        }
    
        /* 2. Layout Wrapper */
        #game-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            flex-grow: 1; /* Takes up remaining space */
            background-color: #f0f0f0;
        }
    
        /* 3. Unified Overlay Style (Lobby & Login) */
        .overlay {
            background: #ffffff;
            color: #000000;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column; /* This fixes the overlap by stacking vertically */
            align-items: center;    
            gap: 15px;             /* Adds consistent breathing room between items */
            min-width: 320px;
            max-width: 90%;
            border: 1px solid #eaeaea;
            z-index: 100;
        }
    
        /* This ensures the login overlay behaves like the lobby overlay */
        #login-overlay {
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(255,255,255,0.98); 
            display: flex; 
            justify-content: center; 
            align-items: center;
            z-index: 200;
        }
    
        /* 4. Player List Styling */
        #player-list-container {
            width: 100%;
        }
    
        #player-names-list {
            list-style: none;
            padding: 0;
            margin: 15px 0;
            width: 100%;
        }
    
        #player-names-list li {
            padding: 12px;
            background: #f8f9fa; /* Light gray for contrast */
            color: #000000 !important;
            margin-bottom: 8px;
            border-radius: 8px;
            border: 1px solid #dee2e6;
            text-align: left;
            font-weight: 500;
        }

        #player-names-list li.player-ready {
            background-color: #e8f5e9 !important; /* Light green */
            border: 1px solid #4CAF50 !important;
            color: #2e7d32 !important;
            font-weight: bold;
        }
        #room-input {
            display: block;        /* Ensures it behaves like a layout block */
            margin: 0 auto;        /* Standard CSS trick to center a block element */
            width: 250px;          /* Match your name input width */
            height: 50px;
            font-size: 28px;       /* Make the numbers big and clear */
            font-weight: bold;
            text-align: center;    /* <--- THIS CENTERS THE NUMBERS INSIDE */
            letter-spacing: 8px;   /* Adds professional spacing between digits */
            border: 2px solid #ccc;
            border-radius: 10px;
            background-color: #f9f9f9;
            color: #000000;
        }

        /* Ensure the container doesn't have extra padding pushing it left */
        #room-controls {
            display: flex;
            flex-direction: column;
            align-items: center;   /* Centers the input box itself */
            width: 100%;
            gap: 15px;
        }       
        #room-controls p {
            text-align: center;    /* Centers the "Your Room Code:" text */
            width: 100%;           /* Ensures the "box" it sits in spans the whole card */
            margin: 0 0 5px 0;     /* Cleans up the spacing */
            color: #000000;
        } 
        #room-controls button {
            width: 100%;
            margin-top: 0; /* Gap handles this now */
        }
    
        /* 5. Game Canvas & Stats */
        canvas {
            max-width: 95vw; 
            height: auto;   
            background: white;
            touch-action: none; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            border: 5px solid #1b5e20;
            border-radius: 8px;
            display: block;
            margin: 20px auto;
        }
    
        .stats { 
            width: 95vw;
            max-width: 765px;
            margin: 10px auto;
            display: flex;
            justify-content: center;
            gap: 20px;
            font-size: 18px;      
            font-weight: bold;       
            color: #000000;
        }

        #timer-box {
            width: 250px;
            height: 30px;
            background-color: #e0e0e0; /* The empty track */
            border-radius: 15px;
            position: relative;
            overflow: hidden;
            border: 2px solid #333;
        }

        #timer-bar {
            width: 100%; /* Starts full */
            height: 100%;
            background-color: #4CAF50; /* Green filling */
            transition: width 1s linear; /* Smooth shrinking animation */
        }

        #timer-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #000;
            font-weight: bold;
            z-index: 2;
        }
    
        /* 6. Inputs and Buttons */
        input { 
            padding: 12px; 
            font-size: 18px; 
            border-radius: 8px; 
            border: 1px solid #ccc; 
            width: 250px; 
            text-align: center;
        }
    
        button { 
            margin-bottom: 15px; /* Adds space below every button */
            padding: 12px 30px; 
            font-size: 18px; 
            background: #28a745; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer;
            width: 100%; 
        }

        /* Remove margin from the very last button so the card looks balanced */
        button:last-child {
            margin-bottom: 0;
        }    
        button:hover { background: #218838; }
        button:active { transform: scale(0.98); }
    
        /* Specific button color for Starting Game */
        .btn-start {
            background: #ff9800;
        }
        .btn-start:hover { background: #e68900; }
    
        /* 7. Orientation & Utility */
        #rotate-warning {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #2e7d32; color: white;
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
    
        @media (orientation: portrait) {
            #rotate-warning { display: flex; }
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; transform: scaleY(1.1); }
            100% { opacity: 1; }
        }

        .pulse-animation {
            animation: pulse 0.5s infinite ease-in-out;
        }
    </style>
</head>
<body>
    <div id="rotate-warning">
        <div style="font-size: 50px;">🔄</div>
        <h2>Please Rotate Your Device</h2>
        <p>Fruitbox is best played horizontally!</p>
    </div>
    <div id="game-wrapper">
        <div id="login-overlay" class="overlay">
            <h1>🍎 Fruitbox</h1>

            <div id="error-display" style="display: none; color: #d32f2f; background: #ffebee; padding: 10px; border-radius: 5px; margin-bottom: 15px; width: 80%; font-size: 14px; border: 1px solid #ffcdd2;">
            </div>
            
            <div class="input-group">
                <input type="text" id="username-input" placeholder="Enter Your Name" maxlength="12">
            </div>
            
            <div id="initial-buttons">
                <button onclick="showMenu('create')" class="btn-create">Create Room</button>
                <button onclick="showMenu('join')" class="btn-join">Join Room</button>
            </div>

            <div id="room-controls" style="display: none;">
                <p style="margin-bottom: 5px; font-weight: bold;">Your Room Code:</p>
                <input type="text" id="room-input" placeholder="Code" readonly>
                <button id="action-button" onclick="finalizeJoin()">Create & Wait</button>
                <button onclick="resetMenu()" style="background: #6c757d;">← Back</button>
            </div>
        </div>

        <div id="lobby-overlay" class="overlay" style="display: none;">
            <div id="lobby-overlay" class="overlay" style="display: none;">
                <h2>
                    Room: <span id="display-room-code">----</span> 
                    <span id="ready-count" style="font-size: 0.8em; color: #666;"></span>
                </h2>
                </div>
            <div id="player-list-container">
                <h3>Players Joined:</h3>
                <ul id="player-names-list"></ul>
            </div>

            <div id="host-controls" style="display: none;">
                <button onclick="sendStartSignal()" class="btn-start">START GAME</button>
                <p class="hint">Waiting for you to start...</p>
            </div>
            
            <div id="guest-msg" style="display: none;">
                <div class="loader"></div>
                <p>Waiting for host to start...</p>
            </div>
        </div>

        <div id="game-container" style="display: none;">
            <div class="stats">
                <div id="timer-box">
                    <div id="timer-bar"></div>
                    <span id="timer-text">2:00</span>
                </div>
                <div id="score-board"></div>
            </div>
            <canvas id="gameCanvas" width="765" height="450"></canvas>
        </div>

        <div id="game-over-overlay" class="overlay" style="display: none;">
            <h1>🏆 Game Over</h1>
            <h2 id="winner-name">----</h2>
            <p id="final-score-text">Score: 0</p>
            
            <div id="play-again-controls" style="width: 100%;">
                <button onclick="requestReset()" class="btn-start">Play Again</button>
                <button onclick="location.reload()" style="background: #6c757d;">Leave Room</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.0.1/socket.io.min.js"></script>
    <script src="{{ url_for('static', filename='game.js') }}"></script>
</body>
</html>
