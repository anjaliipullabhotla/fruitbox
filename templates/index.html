<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Multiplayer Fruitbox</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        :root {
            --bg-main: #fdfdfd;
            --bg-wrapper: #f0f0f0;
            --primary-green: #28a745;
            --primary-orange: #ff9800;
            --text-dark: #000000;
            --shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        html, body {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            overflow: hidden;
            background: var(--bg-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text-dark);
        }

        body { display: flex; flex-direction: column; align-items: center; }

        #permanent-header {
            width: 100%;
            background: white;
            padding: 15px 0;
            text-align: center;
            border-bottom: 1px solid #eaeaea;
            flex-shrink: 0;
            z-index: 1000;
        }
        #permanent-header h1 { margin: 0; font-size: 2rem; }

        #game-wrapper {
            position: relative;
            flex-grow: 1;
            width: 100%;
            background-color: var(--bg-wrapper);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            overflow-y: auto;
        }

        .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255, 255, 255, 0.98);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200;
        }

        .card {
            background: #ffffff;
            padding: 40px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            min-width: 320px;
            max-width: 90%;
            border: 1px solid #eaeaea;
        }

        input { 
            padding: 12px; font-size: 18px; border-radius: 8px; 
            border: 1px solid #ccc; width: 250px; text-align: center;
            background: #f9f9f9;
        }

        #room-controls {
            display: none; 
            flex-direction: column;
            align-items: center;  
            justify-content: center;
            width: 100%;
            gap: 15px;
        }

        #room-input {
            height: 50px; font-size: 28px; font-weight: bold;
            letter-spacing: 8px; border: 2px solid #ccc;
            text-align: center; display: block;
        }

        #player-names-list li.player-ready {
            background-color: #e8f5e9 !important;
            border: 1px solid #4CAF50 !important;
            border-radius: 8px;
            color: #2e7d32 !important;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #room-controls p {
            text-align: center;
            width: 100%; 
            margin: 0 0 5px 0;
        }

        button { 
            padding: 12px 30px; font-size: 18px; border-radius: 8px; 
            border: none; cursor: pointer; width: 100%;
            background: var(--primary-green); color: white;
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.98); }
        button:hover { opacity: 0.9; }

        .btn-start { background: var(--primary-orange); }

        .stats {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px; background: #f8f9fa; border-bottom: 2px solid #ddd;
            width: 765px; max-width: 95vw;
        }

        .room-info {
            font-family: monospace; background: #eee;
            padding: 4px 8px; border-radius: 4px;
        }

        #timer-box {
            width: 200px; height: 25px; background: #e0e0e0;
            border-radius: 15px; position: relative; overflow: hidden;
            border: 2px solid #333;
        }

        #timer-bar {
            width: 100%; height: 100%; background: #4CAF50;
            transition: width 1.1s linear;
        }

        #timer-text {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); font-weight: bold;
        }

        canvas {
            max-width: 95vw; height: auto; background: white;
            box-shadow: var(--shadow); border: 5px solid #1b5e20;
            border-radius: 8px; display: block; margin: 20px auto;
        }

        #rotate-warning {
            display: none; position: fixed; inset: 0;
            background: #2e7d32; color: white; z-index: 9999;
            flex-direction: column; justify-content: center; align-items: center;
        }
        @media (orientation: portrait) { #rotate-warning { display: flex; } }

        @keyframes pulse {
            50% { opacity: 0.7; transform: scaleY(1.1); }
        }
        .pulse-animation { animation: pulse 0.5s infinite ease-in-out; }
    </style>
</head>
<body>

    <div id="rotate-warning">
        <div style="font-size: 50px;">🔄</div>
        <h2>Please Rotate Your Device</h2>
        <p>Fruitbox is best played horizontally!</p>
    </div>

    <div id="permanent-header">
        <h1>🍎 Fruitbox</h1>
    </div>

    <div id="game-wrapper">
        
        <div id="login-overlay" class="overlay">
            <div class="card">
                <div id="error-display" style="display: none; color: #d32f2f; background: #ffebee; padding: 10px; border-radius: 5px; width: 80%; font-size: 14px; border: 1px solid #ffcdd2;"></div>
                
                <input type="text" id="username-input" placeholder="Enter Your Name" maxlength="12">
                
                <div id="initial-buttons" style="width: 100%; display: flex; flex-direction: column; gap: 10px;">
                    <button onclick="showMenu('create')">Create Room</button>
                    <button onclick="showMenu('join')" style="background: #007bff;">Join Room</button>
                </div>

                <div id="room-controls" style="display: none; width: 100%; flex-direction: column; gap: 10px; align-items: center;">
                    <p style="font-weight: bold; margin: 0;">Your Room Code:</p>
                    <input type="text" id="room-input" readonly>
                    <button id="action-button" onclick="finalizeJoin()">Confirm</button>
                    <button onclick="resetMenu()" style="background: #6c757d;">← Back</button>
                </div>
            </div>
        </div>

        <div id="lobby-overlay" class="overlay" style="display: none;">
            <div class="card">
                <h2>Room: <span id="display-room-code">----</span> <span id="ready-count" style="font-size: 0.8em; color: #666;"></span></h2>
                
                <div id="player-list-container" style="width: 100%;">
                    <h3>Players Joined:</h3>
                    <ul id="player-names-list" style="list-style: none; padding: 0;"></ul>
                </div>

                <div id="host-controls" style="display: none; width: 100%;">
                    <button onclick="sendStartSignal()" class="btn-start">START GAME</button>
                    <p style="font-size: 0.9em; text-align: center;">Waiting for you to start...</p>
                </div>
                
                <div id="guest-msg" style="display: none; text-align: center;">
                    <p>Waiting for host to start...</p>
                </div>
            </div>
        </div>

        <div id="game-container" style="display: none; flex-direction: column; align-items: center;">
            <div id="interaction-alert" style="color: red; font-weight: bold; min-height: 20px;"></div>
            <div class="stats">
                <div class="room-info">Room: <span id="game-room-code">----</span></div>
                <div id="timer-box">
                    <div id="timer-bar"></div>
                    <span id="timer-text">2:00</span>
                </div>
                <div id="score-board"></div>
            </div>
            <canvas id="gameCanvas" width="765" height="450"></canvas>
        </div>

        <div id="game-over-overlay" class="overlay" style="display: none;">
            <div class="card">
                <h1>🏆 Game Over</h1>
                <div class="room-info">Room: <span id="game-over-room-code">----</span></div>
                <h2 id="winner-name">----</h2>
                <p id="final-score-text" style="font-size: 1.2em;">Score: 0</p>
                
                <div style="width: 100%; display: flex; flex-direction: column; gap: 10px;">
                    <button onclick="requestReset()" class="btn-start">Play Again</button>
                    <button onclick="leaveRoom()" style="background: #6c757d;">Leave Room</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.0.1/socket.io.min.js"></script>
    <script src="{{ url_for('static', filename='game.js') }}"></script>
</body>
</html>
